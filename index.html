<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f0f23;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#app {
  width: 100%;
  max-width: 900px;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 2.2em;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  text-align: center;
  color: #888;
  margin-bottom: 32px;
  font-size: 0.95em;
}

/* Menu */
#menu { text-align: center; }

.level-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  max-width: 520px;
  margin: 0 auto 20px;
}

.level-btn {
  background: linear-gradient(135deg, #1a1a3e, #2a2a5e);
  border: 1px solid #444;
  border-radius: 12px;
  padding: 18px 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.level-btn:hover {
  border-color: #ffd200;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 210, 0, 0.15);
}

.level-btn .name {
  font-size: 1.15em;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}


/* Game board */
#game { display: none; }

.info-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 12px 18px;
  background: #1a1a3e;
  border-radius: 10px;
}

.info-bar .turn {
  font-size: 1.1em;
  font-weight: 600;
}

.info-bar .turn.player { color: #4fc3f7; }
.info-bar .turn.computer { color: #ff7043; }

.back-btn {
  background: none;
  border: 1px solid #555;
  color: #aaa;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85em;
  transition: all 0.2s;
}
.back-btn:hover { border-color: #ffd200; color: #ffd200; }

.piles-container {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 24px;
}

.pile-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: #13132e;
  border-radius: 10px;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}

.pile-row.active { border-color: #4fc3f7; }

.pile-label {
  min-width: 28px;
  font-weight: 700;
  color: #888;
  font-size: 0.9em;
}

.stones {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
}

.stone {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #6ec6ff, #1565c0);
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
  position: relative;
}

.stone:hover:not(.removed):not(.disabled) {
  transform: scale(1.15);
  border-color: #ffd200;
}

.stone.selected {
  background: radial-gradient(circle at 35% 35%, #fff176, #f57f17);
  border-color: #ffd200;
  transform: scale(1.1);
  box-shadow: 0 0 12px rgba(255, 210, 0, 0.4);
}

.stone.removed {
  background: #2a2a4a;
  border: 2px dashed #444;
  cursor: default;
  opacity: 0.3;
}

.stone.disabled {
  cursor: default;
  opacity: 0.7;
}

.stone.computer-remove {
  background: radial-gradient(circle at 35% 35%, #ff8a80, #c62828);
  border-color: #ff5252;
  animation: computerPick 0.5s ease;
}

@keyframes computerPick {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(0.8); opacity: 0.3; }
}

.pile-count {
  min-width: 40px;
  text-align: center;
  font-weight: 700;
  color: #4fc3f7;
  font-size: 1.3em;
  background: #1a1a3e;
  border-radius: 8px;
  padding: 4px 8px;
}

.actions {
  text-align: center;
  margin-bottom: 16px;
}

.confirm-btn {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  border: none;
  color: #000;
  padding: 12px 40px;
  border-radius: 8px;
  font-size: 1.05em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.confirm-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(255, 210, 0, 0.3);
}

.confirm-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

.hint {
  text-align: center;
  color: #666;
  font-size: 0.85em;
  margin-top: 8px;
}

/* Result overlay */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.75);
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.overlay.show { display: flex; }

.result-card {
  background: #1a1a3e;
  border-radius: 16px;
  padding: 40px 50px;
  text-align: center;
  border: 2px solid #444;
}

.result-card h2 {
  font-size: 2em;
  margin-bottom: 12px;
}

.result-card h2.win { color: #66bb6a; }
.result-card h2.lose { color: #ef5350; }

.result-card p {
  color: #999;
  margin-bottom: 24px;
}

.result-actions { display: flex; gap: 12px; justify-content: center; }

.result-actions button {
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}

.btn-retry {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #000;
}

.btn-menu {
  background: none;
  border: 1px solid #666 !important;
  color: #ccc;
}

.btn-retry:hover { transform: translateY(-2px); }
.btn-menu:hover { border-color: #ffd200 !important; color: #ffd200; }

.rule-note {
  text-align: center;
  color: #777;
  font-size: 0.85em;
  margin-bottom: 24px;
  line-height: 1.6;
}
</style>
</head>
<body>
<div id="app">

  <!-- Menu -->
  <div id="menu">
    <h1>Ball Game</h1>
    <p class="subtitle">取走最后一颗球的人获胜</p>
    <div class="rule-note">
      每回合从<b>一堆</b>中取走任意数量的球（至少1颗）<br>
      点击球选中，再点击「确认」完成操作
    </div>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <!-- Game -->
  <div id="game">
    <h1>Ball Game</h1>
    <div class="info-bar">
      <span class="turn player" id="turnLabel">你的回合</span>
      <button class="back-btn" onclick="backToMenu()">返回菜单</button>
    </div>
    <div class="piles-container" id="pilesContainer"></div>
    <div class="actions">
      <button class="confirm-btn" id="confirmBtn" disabled onclick="confirmMove()">确认</button>
      <div class="hint" id="hintText">点击球来选择要取走的数量</div>
    </div>
  </div>

  <!-- Result -->
  <div class="overlay" id="resultOverlay">
    <div class="result-card">
      <h2 id="resultTitle"></h2>
      <p id="resultDesc"></p>
      <div class="result-actions">
        <button class="btn-retry" onclick="retry()">再来一局</button>
        <button class="btn-menu" onclick="backToMenu()">返回菜单</button>
      </div>
    </div>
  </div>
</div>

<script>
const LEVELS = [
  { name: 'Easy',        piles: 2,  max: 5,   r: 0   },
  { name: 'Easy-Medium', piles: 3,  max: 5,   r: 30  },
  { name: 'Medium',      piles: 3,  max: 10,  r: 80  },
  { name: 'Medium-Hard', piles: 4,  max: 15,  r: 100 },
  { name: 'Hard',        piles: 5,  max: 30,  r: 100 },
  { name: 'Impossible',  piles: 10, max: 100, r: 100 },
];

let piles = [];
let currentLevel = null;
let selectedPile = -1;
let selectedCount = 0;
let playerTurn = true;
let gameOver = false;

function initMenu() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const btn = document.createElement('div');
    btn.className = 'level-btn';
    btn.innerHTML = `<div class="name">${i + 1}. ${lv.name}</div>`;
    btn.onclick = () => startGame(i);
    grid.appendChild(btn);
  });
}

function startGame(levelIdx) {
  currentLevel = LEVELS[levelIdx];
  piles = [];
  for (let i = 0; i < currentLevel.piles; i++) {
    piles.push(randInt(1, currentLevel.max));
  }
  selectedPile = -1;
  selectedCount = 0;
  playerTurn = true;
  gameOver = false;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('resultOverlay').classList.remove('show');
  updateTurnLabel();
  renderPiles();
  updateConfirmBtn();
}

function renderPiles() {
  const container = document.getElementById('pilesContainer');
  container.innerHTML = '';
  piles.forEach((count, pileIdx) => {
    const row = document.createElement('div');
    row.className = 'pile-row' + (pileIdx === selectedPile ? ' active' : '');

    const label = document.createElement('div');
    label.className = 'pile-label';
    label.textContent = `#${pileIdx + 1}`;
    row.appendChild(label);

    const stonesDiv = document.createElement('div');
    stonesDiv.className = 'stones';

    for (let s = 0; s < count; s++) {
      const stone = document.createElement('div');
      stone.className = 'stone';
      if (!playerTurn || gameOver) {
        stone.classList.add('disabled');
      } else {
        stone.onclick = () => toggleStone(pileIdx, s);
      }
      if (selectedPile === pileIdx && s >= count - selectedCount) {
        stone.classList.add('selected');
      }
      stonesDiv.appendChild(stone);
    }

    row.appendChild(stonesDiv);

    const countLabel = document.createElement('div');
    countLabel.className = 'pile-count';
    countLabel.textContent = count;
    row.appendChild(countLabel);

    container.appendChild(row);
  });
}

function toggleStone(pileIdx, stoneIdx) {
  if (!playerTurn || gameOver) return;
  const count = piles[pileIdx];

  if (selectedPile !== -1 && selectedPile !== pileIdx) {
    selectedPile = pileIdx;
    selectedCount = 0;
  }

  selectedPile = pileIdx;
  const fromRight = count - 1 - stoneIdx;
  const newCount = fromRight + 1;

  if (newCount === selectedCount) {
    selectedCount = 0;
    selectedPile = -1;
  } else {
    selectedCount = newCount;
  }

  renderPiles();
  updateConfirmBtn();
}

function updateConfirmBtn() {
  const btn = document.getElementById('confirmBtn');
  const hint = document.getElementById('hintText');
  if (selectedCount > 0) {
    btn.disabled = false;
    hint.textContent = `从第 ${selectedPile + 1} 堆取走 ${selectedCount} 颗球`;
  } else {
    btn.disabled = true;
    hint.textContent = playerTurn ? '点击球来选择要取走的数量' : '电脑正在思考...';
  }
}

function updateTurnLabel() {
  const label = document.getElementById('turnLabel');
  if (playerTurn) {
    label.textContent = '你的回合';
    label.className = 'turn player';
  } else {
    label.textContent = '电脑回合';
    label.className = 'turn computer';
  }
}

function confirmMove() {
  if (selectedCount <= 0 || selectedPile < 0) return;

  piles[selectedPile] -= selectedCount;
  selectedPile = -1;
  selectedCount = 0;

  renderPiles();
  updateConfirmBtn();

  if (!isNotEmpty()) {
    endGame(true);
    return;
  }

  playerTurn = false;
  updateTurnLabel();
  updateConfirmBtn();

  setTimeout(computerMove, 600 + Math.random() * 600);
}

function computerMove() {
  if (gameOver) return;

  let id, delta;
  const c = randInt(1, 100);

  if (c > currentLevel.r) {
    const nonEmpty = [];
    piles.forEach((v, i) => { if (v > 0) nonEmpty.push(i); });
    id = nonEmpty[randInt(0, nonEmpty.length - 1)];
    delta = randInt(1, piles[id]);
  } else {
    const result = calcOptimal();
    id = result[0];
    delta = result[1];
  }

  animateComputerMove(id, delta);
}

function animateComputerMove(pileIdx, delta) {
  const container = document.getElementById('pilesContainer');
  const row = container.children[pileIdx];
  const stonesDiv = row.querySelector('.stones');
  const stones = stonesDiv.children;
  const count = piles[pileIdx];

  for (let s = count - delta; s < count; s++) {
    if (stones[s]) {
      stones[s].classList.add('computer-remove');
    }
  }

  setTimeout(() => {
    piles[pileIdx] -= delta;

    if (!isNotEmpty()) {
      renderPiles();
      endGame(false);
      return;
    }

    playerTurn = true;
    updateTurnLabel();
    renderPiles();
    updateConfirmBtn();
  }, 700);
}

function calcOptimal() {
  let x = 0;
  for (let i = 0; i < piles.length; i++) x ^= piles[i];

  if (x !== 0) {
    for (let i = 0; i < piles.length; i++) {
      if (piles[i] === 0) continue;
      const y = x ^ piles[i];
      if (piles[i] > y) {
        return [i, piles[i] - y];
      }
    }
  }

  const nonEmpty = [];
  piles.forEach((v, i) => { if (v > 0) nonEmpty.push(i); });
  const id = nonEmpty[randInt(0, nonEmpty.length - 1)];
  const delta = randInt(1, piles[id]);
  return [id, delta];
}

function isNotEmpty() {
  return piles.some(v => v > 0);
}

function endGame(playerWin) {
  gameOver = true;
  const title = document.getElementById('resultTitle');
  const desc = document.getElementById('resultDesc');

  if (playerWin) {
    title.textContent = '你赢了!';
    title.className = 'win';
    desc.textContent = '恭喜，你取走了最后的球!';
  } else {
    title.textContent = '你输了';
    title.className = 'lose';
    desc.textContent = '电脑取走了最后的球。再试一次？';
  }

  setTimeout(() => {
    document.getElementById('resultOverlay').classList.add('show');
  }, 400);
}

function retry() {
  const idx = LEVELS.indexOf(currentLevel);
  startGame(idx);
}

function backToMenu() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('menu').style.display = 'block';
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

initMenu();
</script>
</body>
</html>
